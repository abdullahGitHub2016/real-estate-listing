<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: header-css}"></div>
    <title>DreamHome BD | Real Estate Portal</title>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="bg-blue-900 py-16 px-4">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-white mb-6">Find Your Perfect Home in Bangladesh</h1>
        <div class="bg-white p-2 rounded-lg shadow-xl flex flex-col md:flex-row gap-2">
            <input type="text" placeholder="Search by area..." class="flex-grow p-3 outline-none border-b md:border-b-0 md:border-r border-gray-100">
            <select class="p-3 outline-none bg-transparent border-b md:border-b-0 md:border-r border-gray-100 text-gray-500">
                <option value="">All Locations</option>
                <option th:each="city : ${cities}" th:value="${city.id}" th:text="${city.cityName}">Dhaka</option>
            </select>
            <button class="bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-md transition-colors">SEARCH</button>
        </div>
    </div>
</div>

<main class="max-w-7xl mx-auto px-4 py-12">
    <h2 class="text-2xl font-bold mb-8 flex items-center">
        <span class="w-8 h-1 bg-green-600 mr-3"></span>
        Featured Properties
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div th:each="property : ${properties}" class="bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-xl transition-shadow group border border-gray-100">

            <div class="relative h-64">
                <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute top-4 left-0 bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-r-full shadow-lg">
                    <span th:text="${property.priceTotal != null && property.priceTotal > 0 ? 'BDT ' + #numbers.formatDecimal(property.priceTotal, 0, 'COMMA', 0, 'POINT') : 'Call For Price'}"></span>
                </div>
            </div>

            <div class="p-6">
                <div class="text-[10px] font-bold text-green-600 uppercase mb-1" th:text="${property.propertyType}">Apartment</div>
                <h3 class="font-bold text-lg text-blue-900 mb-2 truncate" th:text="${property.title}">Property Title</h3>

                <div class="flex items-center text-gray-400 text-sm mb-4">
                    <i class="fa-solid fa-location-dot mr-2"></i>
                    <span th:text="${property.areaName + ', ' + (property.city != null ? property.city.cityName : 'Dhaka')}">Location</span>
                </div>

                <div class="flex border-t border-gray-50 pt-4 mt-4 justify-between text-center">
                    <div>
                        <span class="block text-[10px] text-gray-400 uppercase font-bold">Beds</span>
                        <span class="text-sm font-bold" th:text="${property.beds}">0</span>
                    </div>
                    <div class="border-x border-gray-100 px-6">
                        <span class="block text-[10px] text-gray-400 uppercase font-bold">Baths</span>
                        <span class="text-sm font-bold" th:text="${property.baths}">0</span>
                    </div>
                    <div>
                        <span class="block text-[10px] text-gray-400 uppercase font-bold">Sqft</span>
                        <span class="text-sm font-bold" th:text="${property.sizeSqft}">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 px-6 py-3 border-t border-gray-100 flex items-center justify-between">
                <span class="text-xs font-bold text-blue-900"
                      th:text="${property.developer != null ? property.developer.developerName : 'Private Seller'}">Developer</span>
                <a th:href="@{/property/{id}(id=${property.id})}"
                   class="text-green-600 text-xs font-bold hover:underline">
                    View Details
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
